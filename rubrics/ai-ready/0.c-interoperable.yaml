id: "0.c"
criterion: "FAIRness"
sub_criterion: "Interoperable"

practice: |
  Wherever possible, provide data and metadata using formally defined
  specifications for digital objects.
suggested_resources: ["RDF", "JSON-LD"]

intent: |
  Both metadata and data use formally defined specifications — JSON-LD
  for metadata, declared schemas for tabular / structured data, RDF
  or equivalent for graph content — so other systems can consume
  them without bespoke parsing.

# DRAFT — heavy overlap with 6.a Standardized, which scores
# adherence to specific named standards (Croissant, RO-Crate spec,
# JSON Schema). 0.c is the broader FAIR-baseline cousin: "is the
# packaging formally specified at all". Reviewer may decide to
# fold 0.c into 6.a, or keep 0.c as the baseline pre-condition for
# 6.a's deeper check.
what_to_look_for:
  - "@context populated with one or more recognized vocabularies (schema.org, EVI, DCAT, Croissant) — JSON-LD baseline."
  - Schema entities (@type 'Schema' or 'evi:Schema') for structured
    Datasets, declaring fields and types.
  - Data files in formats with a published spec (CSV, Parquet,
    JSON, JSONL, HDF5, NIfTI, BAM, FASTQ) rather than ad-hoc
    formats with no spec.

extractor_inputs:
  type: object
  properties:
    context_namespaces:
      type: array
      description: values from the @context array of ro-crate-metadata.json
    schema_count:
      type: integer
      description: count of entities whose @type contains 'Schema' (or 'evi:Schema')
    dataset_count:
      type: integer
      description: count of entities whose @type contains 'Dataset' (root crate excluded)
    datasets_with_schema_count:
      type: integer
      description: count of Datasets with evi:schema, conformsTo, or schema set to a Schema entity
    formats_with_published_spec_count:
      type: integer
      description: |
        count of Datasets whose format has a published, widely-readable
        specification (CSV, Parquet, JSON, JSONL, HDF5, NIfTI, BAM,
        FASTQ, Zarr, plus standard image / audio formats).

scoring:
  "0":
    label: "Absent"
    rule: |
      Metadata @context is minimal or non-standard, no Schema
      entities, and data formats are unspecified or proprietary
      with no spec.
  "1":
    label: "Partial"
    rule: |
      Metadata uses a recognized JSON-LD vocabulary (RO-Crate
      baseline) but Datasets lack linked schemas, or a meaningful
      fraction of data files use formats without a published spec.
  "2":
    label: "Substantive"
    rule: |
      Metadata is in JSON-LD with recognized vocabularies AND
      structured Datasets carry linked schemas AND data files use
      formats with published specifications. The FAIR baseline for
      interoperability is met.

output_schema:
  type: object
  required: [score, rationale, evidence]
  additionalProperties: false
  properties:
    score:
      type: integer
      enum: [0, 1, 2]
    rationale:
      type: string
      description: "1–3 sentences citing the rule that applied."
    evidence:
      type: array
      items: { type: string }
      description: "Direct quotes or @id refs from the crate that justify the score."
    gaps:
      type: array
      items: { type: string }
      description: "Specific things missing that would raise the score. Empty if score is 2."
