id: "1.c"
criterion: "Provenance"
sub_criterion: "Interpretable"

practice: |
  Make software for key data transformation and analysis steps
  identifiable and obtainable — via a repository, archive, package
  registry, container reference, or a clear citation to a widely
  recognized tool.
suggested_resources: ["Zenodo", "Software Heritage", "GitHub", "package registries (PyPI, CRAN, Bioconductor)"]

intent: |
  The software referenced in the provenance can be identified and
  obtained by a reader. Each Software entity either resolves to a
  real artifact, or names a widely recognized tool/package (with
  version) that a reader can recognize and locate. A sustainable
  archive (Zenodo, Software Heritage) is a plus but not required —
  some software is proprietary or commercial by nature and cannot be
  archived or made open, and that is acceptable as long as it is
  clearly and citably identified.

what_to_look_for:
  - Each Software entity is identifiable: a resolvable URL or PID
    (Zenodo DOI, Software Heritage SWHID, GitHub URL, container ref),
    OR a clear citation to a widely recognized tool/package
    (e.g. name + version, a package registry entry, or a DOI).
  - Proprietary / commercial software is acceptable when it is
    clearly named and versioned — it does not need to be archived,
    open, or in a sustainable repository.
  - Version information present (versionTag, version, git commit,
    or a DOI / registry entry that pins a release).
  - Sustainable archives are credited as a plus, not required.

extractor_inputs:
  type: object
  properties:
    software_count:
      type: integer
      description: count of entities whose @type contains 'Software'
    software_with_link_count:
      type: integer
      description: |
        count of Software entities with a resolvable URL on @id, url,
        codeRepository, or contentUrl.
    software_in_sustainable_archive_count:
      type: integer
      description: |
        Informational only (not required for a top score): subset of
        the above whose link points to zenodo.org,
        archive.softwareheritage.org, or another long-term archive.
    software_with_version_count:
      type: integer
      description: count of Software entities with version, versionTag, or a release-pinning DOI
    software_samples:
      type: array
      description: |
        Up to 10 Software entity dicts. Include @id, name, url,
        codeRepository, version.

scoring:
  "0":
    label: "Absent"
    rule: |
      No Software entities, or none can be identified — neither a
      resolvable link/PID nor a recognizable named-and-versioned
      tool.
  "1":
    label: "Partial"
    rule: |
      Software is referenced but identification is incomplete — some
      steps name no tool at all, links are broken, or tools are named
      without enough detail (no version, ambiguous name) to locate
      them.
  "2":
    label: "Substantive"
    rule: |
      Substantively all referenced Software is identifiable and
      obtainable: each either resolves to a versioned artifact
      (link / PID / release-pinned DOI / git tag / package version)
      or is a widely recognized tool cited with name + version.
      Sustainable archiving is credited as a plus but not required;
      proprietary tools that are clearly named and versioned count.

output_schema:
  type: object
  required: [score, rationale, evidence]
  additionalProperties: false
  properties:
    score:
      type: integer
      enum: [0, 1, 2]
    rationale:
      type: string
      description: "1–3 sentences citing the rule that applied."
    evidence:
      type: array
      items: { type: string }
      description: "Direct quotes or @id refs from the crate that justify the score."
    gaps:
      type: array
      items: { type: string }
      description: "Specific things missing that would raise the score. Empty if score is 2."
