id: "2.b"
criterion: "Characterization"
sub_criterion: "Statistics"

practice: |
  Provide domain-appropriate statistical characterizations of key
  features of the dataset to inform analysis planning. Ensure
  missing values are encoded consistently.

intent: |
  A modeler can see the shape of the data without loading it —
  sample sizes, distributions or class balance for key features,
  and a documented missing-value convention. This is what lets
  someone decide whether the data fits their analysis before they
  invest in pulling it down.

what_to_look_for:
  - >-
    Per-Dataset fields lifted onto Dataset itself — rowCount,
    columnCount, contentSize, sampleSize. Any one of these counts
    as "characterized" for that Dataset.
  - >-
    hasSummaryStatistics pointing at a child Dataset that carries
    richer per-column stats (dtype / null counts / numeric
    min/max/mean/std, often serialized as additionalProperty
    perColumnStats). Equally valid as inline fields.
  - >-
    Domain-appropriate distributions — class balance for
    categorical outcomes, range/mean/SD for continuous, count
    distributions for sequencing, etc.
  - >-
    A consistent missing-value encoding (NA / null / empty string /
    sentinel) documented somewhere — root description, schema, or
    a dedicated narrative field.

scope_note: |
  Coverage counts are TABULAR-SCOPED. Datasets whose format is an
  image (jpg/png/tiff), vendor binary directory (.d / .raw),
  sequencing read file (BAM/FASTQ), audio, or other non-tabular
  format cannot meaningfully carry row/column counts or summary
  distributions, so they are excluded from both numerator and
  denominator. Do not penalize a crate for those entities lacking
  rowCount or hasSummaryStatistics — check
  non_tabular_dataset_count and judge against tabular_dataset_count
  instead. `summary_stats_samples` is illustrative (max 5), not
  exhaustive — absence of an entity from the sample doesn't mean
  it lacks stats.

extractor_inputs:
  type: object
  properties:
    dataset_count:
      type: integer
      description: |
        TABULAR Dataset count — the rubric denominator. Datasets in
        non-tabular formats are excluded so they don't drag the
        score. (Alias of tabular_dataset_count.)
    tabular_dataset_count:
      type: integer
      description: count of Datasets whose declared format is tabular (csv/tsv/parquet/h5ad/jsonl/xlsx/...).
    dataset_count_all:
      type: integer
      description: count of all Dataset entities (root crate excluded), tabular and non-tabular combined.
    non_tabular_dataset_count:
      type: integer
      description: |
        count of Dataset entities that are NOT tabular (images,
        vendor binary dirs, BAM/FASTQ, audio, etc.). These are
        expected to lack rowCount / hasSummaryStatistics and do not
        count against the score.
    datasets_with_summary_stats_count:
      type: integer
      description: |
        count of TABULAR Datasets carrying hasSummaryStatistics
        (link to a child SummaryStats entity).
    datasets_with_summary_stats_all_count:
      type: integer
      description: same, over all Datasets (tabular + non-tabular), for cross-check.
    datasets_with_size_count:
      type: integer
      description: |
        count of TABULAR Datasets carrying at least one of the
        lifted per-Dataset characterization fields — rowCount,
        columnCount, contentSize, sampleSize, or size.
    datasets_with_size_all_count:
      type: integer
      description: same, over all Datasets, for cross-check.
    summary_stats_samples:
      type: array
      description: |
        Up to 5 illustrative entries showing how characterization is
        attached on this crate — a mix of (a) Datasets with
        hasSummaryStatistics linking a child SummaryStats Dataset,
        and (b) Datasets carrying the lifted fields (rowCount /
        columnCount / contentSize / sampleSize) directly. Treat as
        evidence of pattern, not an exhaustive list.
    missing_value_convention_text:
      type: ["string", "null"]
      description: |
        any narrative on missing-value encoding found in root
        description, additionalProperty, or rai:dataCollectionMissingData
        (when used to describe convention rather than reasons).

scoring:
  "0":
    label: "Absent"
    rule: |
      No statistical information on tabular Datasets beyond raw
      file size, and no missing-value convention documented. (A
      crate with zero tabular Datasets but rich image/binary
      content is not "absent" — score it against what could
      plausibly be characterized.)
  "1":
    label: "Partial"
    rule: |
      Some characterization present on tabular Datasets — either
      lifted fields (rowCount / columnCount / contentSize /
      sampleSize) or hasSummaryStatistics links exist for some, but
      not most, OR distributions / class balance are not provided,
      OR missing-value handling is unspecified.
  "2":
    label: "Substantive"
    rule: |
      Most tabular Datasets are characterized — via the lifted
      per-Dataset fields, linked SummaryStats children, or both —
      AND domain-appropriate distributions / class balance exist
      for the major Datasets, AND a missing-value convention is
      documented. Coverage is judged against tabular_dataset_count,
      not dataset_count_all.

output_schema:
  type: object
  required: [score, rationale, evidence]
  additionalProperties: false
  properties:
    score:
      type: integer
      enum: [0, 1, 2]
    rationale:
      type: string
      description: "1–3 sentences citing the rule that applied."
    evidence:
      type: array
      items: { type: string }
      description: "Direct quotes or @id refs from the crate that justify the score."
    gaps:
      type: array
      items: { type: string }
      description: "Specific things missing that would raise the score. Empty if score is 2."
