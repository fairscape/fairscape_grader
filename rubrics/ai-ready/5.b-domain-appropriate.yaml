id: "5.b"
criterion: "Sustainability"
sub_criterion: "Domain-appropriate"

practice: |
  Ensure single-domain raw or processed data are deposited in a
  FAIR-domain-appropriate specialist repository if available.
suggested_resources: ["FAIRsharing.org", "NIH GREI repositories"]

intent: |
  Where a domain-specialist repository exists for this kind of data,
  the data is deposited there — GEO for transcriptomics, dbGaP for
  human genetics, PhysioNet for physiological signals, PRIDE for
  proteomics, BioStudies for omics, etc. Generic hosting is fine
  when no specialist exists, but a specialist match should be used
  when available.

what_to_look_for:
  - distribution / contentUrl pointing to a recognized specialist
    repository.
  - Accession numbers from such repositories (GSE/GDS, GSEAxxx,
    EGA, PRJ, dbGaP phs IDs, PhysioNet slugs, etc.).
  - isPartOf / publisher referring to the specialist repository.
  - Where a specialist exists for this data type but isn't used,
    rationale for using a generalist instead.

extractor_inputs:
  type: object
  properties:
    distribution_links:
      type: array
      description: |
        contentUrl / url / distribution entries across the root and
        major Datasets.
    domain_repo_indicators:
      type: array
      description: |
        recognized specialist-repository signals detected in the
        crate — GEO accessions, dbGaP phs IDs, PhysioNet slugs,
        EGA / ENA / SRA accessions, PRIDE PXD, BioStudies S-BSST,
        etc. Each entry includes the value and which repo it maps to.
    publisher_info:
      type: ["object", "string", "null"]
      description: publisher on the root dataset
    data_domain_hint:
      type: ["string", "null"]
      description: |
        keywords / description text that hint at the data domain
        (omics type, modality, etc.) so the LLM can judge whether
        a specialist repo would have been expected.

scoring:
  "0":
    label: "Absent"
    rule: |
      Data hosted only in a non-specialist generic location, with
      no rationale, in a domain that has well-established
      specialist repositories.
  "1":
    label: "Partial"
    rule: |
      A specialist repository is referenced but coverage is partial
      (e.g., only some component datasets deposited there), or the
      generalist host has documented rationale.
  "2":
    label: "Substantive"
    rule: |
      Component datasets are deposited in domain-appropriate
      specialist repositories where they exist — or the data
      domain genuinely has no specialist and a strong generalist
      (Zenodo / Dataverse) is used.

output_schema:
  type: object
  required: [score, rationale, evidence]
  additionalProperties: false
  properties:
    score:
      type: integer
      enum: [0, 1, 2]
    rationale:
      type: string
      description: "1–3 sentences citing the rule that applied."
    evidence:
      type: array
      items: { type: string }
      description: "Direct quotes or @id refs from the crate that justify the score."
    gaps:
      type: array
      items: { type: string }
      description: "Specific things missing that would raise the score. Empty if score is 2."
