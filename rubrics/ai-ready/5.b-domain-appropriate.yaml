id: "5.b"
criterion: "Sustainability"
sub_criterion: "Domain-appropriate"

practice: |
  Ensure data are deposited in a recognized, supported research-data
  repository — a domain-appropriate specialist repository where a
  well-established one fits the data type, or otherwise a well-known
  generalist repository.
suggested_resources:
  - "NIH BMIC domain-specific repositories: https://www.nlm.nih.gov/NIHbmic/domain_specific_repositories.html"
  - "ELIXIR deposition databases: https://elixir-europe.org/platforms/data/elixir-deposition-databases"
  - "FAIRsharing.org"
  - "re3data.org"

intent: |
  The data should live in an established, community-recognized data
  repository rather than only on a personal site, lab web page, or
  ad-hoc file host. There are hundreds of acceptable repositories and
  they cannot be enumerated — the NIH BMIC and ELIXIR catalogs above are
  starting points, NOT an exhaustive allow-list, and many more exist.
  Two broad cases both fully satisfy this criterion:
    1. A domain-appropriate specialist repository for the data type
       (e.g. a sequence archive for sequencing data, a proteomics
       repository for mass-spec, an imaging archive for imaging) — there
       are very many such repositories across domains.
    2. A well-known, supported generalist repository. The seven NIH
       GREI generalist repositories all fully qualify: Figshare,
       Dataverse, Zenodo, Dryad, Vivli, the Open Science Framework
       (OSF), and Mendeley Data. These are examples, not an exhaustive
       list — other comparable generalists qualify too. A generalist is
       acceptable on its own, including when no specialist clearly fits.
  Be accepting. Do NOT down-score data merely because it sits in a
  generalist rather than a specialist, and do NOT require the repository
  to appear on any particular list. The judgment is simply whether the
  hosting location is a recognized, supported, persistent data
  repository for research data. When the specific repository is not one
  you recognize by name, a well-formed persistent identifier or an
  institutional / community data-repository host should be treated as
  acceptable — err toward accepting.

what_to_look_for:
  - distribution / contentUrl / publisher pointing to a recognized data
    repository, specialist or generalist. Recognize the host from the
    URL domain, a DOI / accession, or the publisher field.
  - A persistent identifier (DOI, accession, ARK, handle) that implies
    deposit in a managed repository.
  - Whether the host is a managed research-data repository at all, as
    opposed to a personal / lab website, a transient cloud link, or no
    distribution at all.
  - When the specific repository can't be recognized by name, treat a
    well-formed persistent identifier or an institutional / community
    data-repository host as acceptable.

extractor_inputs:
  type: object
  properties:
    distribution_links:
      type: array
      description: |
        contentUrl / url / distribution entries across the root and
        major Datasets. Each entry includes the URL and its `host`
        (hosting domain) so the repository can be recognized without
        matching against any fixed list.
    publisher_info:
      type: ["object", "string", "null"]
      description: publisher on the root dataset
    data_domain_hint:
      type: ["object", "null"]
      description: |
        root-level keywords and rai:dataCollectionType that hint at the
        data domain, so the grader can sanity-check repository fit when a
        specialist is clearly expected.

scoring:
  "0":
    label: "Absent"
    rule: |
      No recognized data repository is used — distribution points only
      to a personal / lab website, a transient or private link, or there
      is no distribution and no persistent identifier at all.
  "1":
    label: "Partial"
    rule: |
      Data are in a recognized repository but coverage is incomplete —
      e.g. only some component datasets are deposited there, or links
      are present but the hosting repository cannot be clearly
      established.
  "2":
    label: "Substantive"
    rule: |
      Data are deposited in a recognized, supported data repository —
      EITHER a domain-appropriate specialist OR a well-known generalist.
      Any of the seven NIH GREI generalists qualifies (Figshare,
      Dataverse, Zenodo, Dryad, Vivli, OSF, Mendeley Data), as do other
      comparable generalists and specialist archives. A generalist alone
      is sufficient; a specialist is not required.

output_schema:
  type: object
  required: [score, rationale, evidence]
  additionalProperties: false
  properties:
    score:
      type: integer
      enum: [0, 1, 2]
    rationale:
      type: string
      description: "1–3 sentences citing the rule that applied."
    evidence:
      type: array
      items: { type: string }
      description: "Direct quotes or @id refs from the crate that justify the score."
    gaps:
      type: array
      items: { type: string }
      description: "Specific things missing that would raise the score. Empty if score is 2."
